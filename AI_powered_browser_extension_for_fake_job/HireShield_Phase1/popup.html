<!DOCTYPE html>
<html>
<head>
    <title>HireShield</title>
    <style>
        body {
            width: 360px;
            min-height: 520px;
            font-family: Arial, sans-serif;
            padding: 12px;
        }

        h3 {
            margin-top: 0;
        }

        button {
            width: 100%;
            padding: 10px;
            font-size: 14px;
            margin-bottom: 12px;
            cursor: pointer;
        }

        #riskBanner {
            display: none;
            padding: 10px;
            font-weight: bold;
            text-align: center;
            border-radius: 6px;
            margin-bottom: 10px;
        }

        #meterContainer {
            width: 100%;
            height: 12px;
            background: #ddd;
            border-radius: 6px;
            margin-bottom: 12px;
            overflow: hidden;
        }

        #meterBar {
            height: 12px;
            width: 0%;
            border-radius: 6px;
            transition: width 0.4s ease;
        }

        #stats {
            font-size: 12px;
            margin-bottom: 10px;
            color: #555;
        }

        #keywords {
            font-size: 12px;
            margin-bottom: 10px;
        }

        #result {
            white-space: pre-wrap;
            font-size: 13px;
            max-height: 200px;
            overflow-y: auto;
        }

        #analyticsBtn {
            background: #222;
            color: white;
            border: none;
        }
    </style>
</head>
<body>

<h3>HireShield</h3>

<button id="scanBtn">Scan Job</button>

<div id="riskBanner"></div>

<div id="meterContainer">
    <div id="meterBar"></div>
</div>

<div id="stats"></div>

<div id="keywords"></div>

<div id="result">
Click "Scan Job", then click a job title.
</div>

<hr>

<button id="analyticsBtn">View Full Analytics</button>

<script src="popup.js"></script>

</body>
</html>
